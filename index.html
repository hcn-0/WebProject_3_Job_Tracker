<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Tracker</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="w-[80%] max-h-screen mx-auto">
    <header class="">
      <h1 class="text-2xl md:text-4xl font-bold mt-16">
        Job Application Tracker
      </h1>
      <section class="flex flex-wrap gap-6 mt-8">
        <div class="count w-90 h-30 border border-sky-300">
          <p class="p-4">Total</p>
          <p id="total" class="pl-4 text-2xl font-bold">0</p>
        </div>
        <div class="count w-90 h-30 border border-sky-300">
          <p class="p-4">Interview</p>
          <p id="interview" class="pl-4 text-2xl text-green-600 font-bold">0</p>
        </div>
        <div class="count w-90 h-30 border border-sky-300">
          <p class="p-4">Rejected</p>
          <p id="rejected" class="pl-4 text-2xl text-red-600 font-bold">0</p>
        </div>
      </section>
    </header>
    <hr class="mt-10" />

    <main>
      <h2 class="text-2xl md:text-4xl font-bold mt-8">Available Jobs</h2>
      <section class="buttons mt-5">
        <button id="all-btn" class="btn w-30 btn-primary">All</button>
        <button id="all-btn" class="btn w-30">Interview</button>
        <button id="all-btn" class="btn w-30">Rejected</button>
      </section>

      <section id="allcards">
        <div class="card"></div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
